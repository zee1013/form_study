<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>input tag</title>
</head>
<body>
    <form>
        <!-- 글자를 입력하는 칸 -->
        <input type="text" placeholder="아이디">
        <input type="text" placeholder="아이디" readonly>
        <!-- 비밀번호 입력하는 칸 -->
        <input type="password" name="" id="" placeholder="비밀번호">
        <!-- 전화번호 입력하는 칸 -->
        <input type="tel" name="" id="" placeholder="전화번호">
        <!-- 숫자만 입력하는 칸 -->
        <input type="number" name="" id="" placeholder="숫자">
        <!-- 인터넷 주소 입력 -->
        <input type="url" name="" id="" placeholder="인터넷 주소">
        <!-- 검색어 입력 -->
        <input type="search" name="" id="" placeholder="검색어">
        <!-- 이메일 입력 -->
        <input type="email" name="" id="" placeholder="이메일">
        <!-- 네모 박스 : 여러개를 선택할 수 있음 -->
        <input type="checkbox" name="" id="">
        <input type="checkbox" name="" id="">
        <input type="checkbox" name="" id="">
        <!-- 동그라미 선택 버튼 : 네임값을 같게 하면 하나만 선택할 수 있음 -->
        <input type="radio" name="radio" id="">
        <input type="radio" name="radio" id="">
        <input type="radio" name="radio" id="">
        <!-- 파일을 컴퓨터에서 선택 -->
        <input type="file" name="" id="">
        <!-- 그냥 버튼 : 눌러도 아무 일도 안일어남 -->
        <input type="button" value="로그인">
        <input type="button" value="로그인" disabled>
        <!-- 이미지 모양 버튼 -->
        <input type="image" src="google_logo.png" alt="구글 로고">
        <!-- 화면에는 안 보이지만 몰래 값을 저장하는 칸 -->
        <input type="hidden" name="">
        <!-- 날짜 선택하는 달력 버튼 -->
        <input type="date" name="" id="">
        <!-- 날짜랑 시간을 같이 선택 -->
        <input type="datetime-local" name="" id="">
        <!-- 년도와 월을 선택 -->
        <input type="month" name="" id="">
        <!-- 몇 번째 주 선택 -->
        <input type="week" name="" id="">
        <!-- 시간 선택 -->
        <input type="time" name="" id="">
        <!-- 막대를 움직여 값을 정하는 칸(볼륨처럼 조절) -->
        <input type="range" name="" id="">
        <!-- 색을 선택하는 칸 -->
        <input type="color" name="" id="">
        <!-- 작성한 내용을 서버로 보내는 버튼 -->
        <input type="submit" value="회원가입">
        <!-- 입력한 내용을 모두 지우는 버튼 -->
        <input type="reset" value="취소버튼">
        <!-- 글쓰기 -->
        <textarea name="" id=""></textarea>

    </form>
</body>
</html>
